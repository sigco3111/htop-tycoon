# htop-tycoon seed fixtures for the 5 ending reachability tests (T33).
#
# Each ending has a deterministic seed that drives the test (BANKRUPTCY
# reaches its target naturally; IPO/HOSTILE_MA/VOLUNTARY_SALE/SECRET use
# the seed for the TickEngine RNG so the crafted-state pipeline is fully
# deterministic). ``expected_tick`` is the number of ticks the test runs
# before evaluating + applying the ending (BANKRUPTCY is a natural
# playthrough to bankruptcy; the others evaluate at expected_tick).
#
# ``command_line`` is a representative CLI invocation that mirrors the
# same (seed, expected_tick) pair, for reproducibility from the shell.
endings:
  BANKRUPTCY:
    seed: 42
    expected_tick: 13
    command_line: "--seed=42 --tick-rate=1000 --ticks=10000"
  IPO:
    seed: 137
    expected_tick: 1
    command_line: "--seed=137 --tick-rate=1000 --ticks=1 --ending=IPO"
  HOSTILE_MA:
    seed: 256
    expected_tick: 1
    command_line: "--seed=256 --tick-rate=1000 --ticks=1 --ending=HOSTILE_MA"
  VOLUNTARY_SALE:
    seed: 512
    expected_tick: 1
    command_line: "--seed=512 --tick-rate=1000 --ticks=1 --player-action=sell"
  SECRET:
    seed: 1024
    expected_tick: 1
    command_line: "--seed=1024 --tick-rate=1000 --ticks=1 --ending=SECRET"
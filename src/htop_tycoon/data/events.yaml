# htop-tycoon events catalog.
# Loaded at startup by htop_tycoon.engine.event_chain.load_events_catalog().
# Effects are dispatched by ``type`` discriminator; each type must have a
# matching handler in event_chain._apply_effect() and a corresponding typed
# class in htop_tycoon.domain.event.Effect.
#
# Conditional events reference a condition by name; the name MUST resolve in
# htop_tycoon.engine.condition_registry.CONDITION_REGISTRY — otherwise load
# fails with ValueError (fail-loud, no silent skip).
#
# Chain effects (``schedule_next_event``) point to another event id in this
# catalog; the chain is truncated at balance.events.max_concurrent_chain_depth
# levels (default 4).

events:
  # ----- Random events (3) -----------------------------------------------

  - id: evt-key-employee-offer
    name_ko: "핵심 인재 이직 제안"
    description_ko: "경쟁사로부터 핵심 인재에게 이직 제안이 들어왔습니다."
    trigger_type: random
    probability_per_tick: 0.05
    condition: null
    effects:
      - type: shift_market_share
        product_id: SaaS
        delta: 0.02

  - id: evt-competitor-price-cut
    name_ko: "경쟁사 가격 인하"
    description_ko: "경쟁사가 제품 가격을 크게 인하했습니다."
    trigger_type: random
    probability_per_tick: 0.08
    condition: null
    effects:
      - type: shift_market_share
        product_id: SaaS
        delta: -0.02

  - id: evt-bulk-order
    name_ko: "대량 주문 유입"
    description_ko: "대량의 주문이 한꺼번에 들어왔습니다."
    trigger_type: random
    probability_per_tick: 0.04
    condition: null
    effects:
      - type: boost_revenue
        product_id: SaaS
        amount: 5000

  # ----- Conditional events (3) -----------------------------------------

  - id: evt-bank-loan-offer
    name_ko: "은행 대출 제안"
    description_ko: "자금이 부족합니다. 은행에서 대출을 제안합니다."
    trigger_type: conditional
    probability_per_tick: 0.0
    condition: cash_below_threshold
    effects:
      - type: boost_revenue
        product_id: SaaS
        amount: 10000

  - id: evt-union-strike
    name_ko: "노조 파업"
    description_ko: "직원 만족도가 낮아 파업이 발생했습니다."
    trigger_type: conditional
    probability_per_tick: 0.0
    condition: employee_satisfaction_low
    effects:
      - type: shift_market_share
        product_id: SaaS
        delta: -0.05

  - id: evt-secret-investor-offer
    name_ko: "비밀 투자자 제안"
    description_ko: "모든 부서가 활성화되었습니다. 비밀 투자자가 연락을 취했습니다."
    trigger_type: conditional
    probability_per_tick: 0.0
    condition: all_depts_unlocked
    effects:
      - type: trigger_secret_investor
      # Chains to a follow-up event so the player can react to the offer.
      - type: schedule_next_event
        event_id: evt-investor-resolution
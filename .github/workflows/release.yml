name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type-check with mypy
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest -q

      - name: Build wheel + sdist
        run: uv build

      - name: Inspect distribution artifacts
        run: ls -la dist/

      - name: Verify tag matches pyproject version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG_NAME#v}"
          PYPROJECT_VERSION="$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')"
          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "ERROR: tag ${TAG_NAME} (${TAG_VERSION}) does not match pyproject.toml version (${PYPROJECT_VERSION})."
            exit 1
          fi
          echo "Tag version ${TAG_VERSION} matches pyproject.toml version."

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release
on:
  push:
    tags: ['v3.*']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
      - run: uv sync --all-extras --dev
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/
      - run: uv run pytest -q
      - run: uv build
      - uses: softprops/action-gh-release@v1
        with:
          files: dist/*